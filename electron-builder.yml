appId: com.flux.app
productName: FLUX
copyright: Copyright © 2026 FLUX

directories:
  buildResources: build
  output: bin

# Lo que se incluye en el .asar. Sin truchadas con extraResources: el bundle
# main.js (out/main/index.js) ya tiene el SQL del schema embebido y solo
# necesita better-sqlite3 (modulo nativo) accesible.
files:
  - out/**/*
  - "!node_modules/**/{CHANGELOG.md,README.md,*.d.ts}"

# better-sqlite3 es modulo NATIVO (.node bindings). DEBE ir desempaquetado:
# Node no puede cargar .node files desde adentro de app.asar.
asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*

# electron-builder corre `npm rebuild` por default (npmRebuild: true) y
# recompila better-sqlite3 con los headers de Electron en cada plataforma
# del matrix de CI. No necesitamos engine binaries pre-build de terceros.

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.music

linux:
  target:
    - AppImage
  category: AudioVideo
