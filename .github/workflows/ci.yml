name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Unit tests (vitest)
        run: npx vitest run --reporter=default

      - name: Build (renderer + main + preload)
        run: npm run build --if-present

  e2e:
    name: E2E (Serenity + Cucumber)
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 30
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Install npm deps
        run: npm ci --legacy-peer-deps

      - name: Build app
        run: npm run build

      - name: Serve renderer for E2E
        run: |
          npx --yes serve out/renderer -l 5173 --no-clipboard &
          # Wait until the server is accepting connections (max 20s)
          for i in $(seq 1 20); do
            curl -sf http://localhost:5173/ > /dev/null 2>&1 && echo "Server ready" && break
            sleep 1
          done
          echo "=== index.html snippet ==="
          curl -s http://localhost:5173/ | head -25
          echo "=== mock.js exists ==="
          curl -sI http://localhost:5173/electron-api-mock.js | head -5

      - name: Run e2e
        working-directory: e2e-tests
        run: mvn -B verify

      - name: Upload Serenity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report
          path: e2e-tests/target/site/serenity
